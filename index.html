<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>article</title>
  </head>
  <body>
    <div id="articles" class="max-w-3xl mx-auto space-y-6">
      <p class="text-center text-gray-500"></p>
    </div>
    <div class="max-w-3xl mx-auto mt-10 bg-white rounded-xl shadow p-6">
      <h2 class="text-2xl font-bold mb-6">Dodaj nowy artykuł</h2>
      <form id="articleForm" class="space-y-4">
        <input id="title" type="text" placeholder="Tytuł" class="w-full border rounded p-2">
        <input id="subtitle" type="text" placeholder="Podtytuł" class="w-full border rounded p-2">
        <input id="author" type="text" placeholder="Autor" class="w-full border rounded p-2">
        <textarea id="content" placeholder="Treść" rows="5" class="w-full border rounded p-2"></textarea>
        <button type="submit" class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600">
            Dodaj artykuł
        </button>
      </form>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
