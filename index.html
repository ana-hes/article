<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>birthday</title>
  </head>
  <body>
    <h1 class="text-2xl font-bold text-primary">Urodziny</h1>
    <form id="birthdayForm">
      <label for="birthday">Twoje urodziny: </label><br>
      <input type="date" id="birthday" name="birthday" required><br>
      <button type="submit" class="bg-blue-300 p-4">To moje urodziny</button>
    </form>
    <dialog id="resultDialog" class="bg-gray-200">
      <button id="closeDialog">
        &times;
      </button>
      <div id="dialogContent" class="text-red-600"></div>
    </dialog>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
